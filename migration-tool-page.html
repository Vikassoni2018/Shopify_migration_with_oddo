<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Migration Tool</title>
<link rel="stylesheet" href="/assets/css/frontend.css">
<style>
.tool-frame{
  width:100%;
  min-height:1200px;
  height:auto;
  border:1px solid #d9e1f6;
  border-radius:12px;
  background:#fff;
  overflow:hidden;
}
</style>
</head>
<body>
<div class="topbar">Specialized migration workspace.</div>
<header class="header"><div class="brand">Migration Portal</div><nav class="nav"><a href="/home.html">Home</a><a href="/services.html">Services</a><a href="/security.html">Security</a><a href="/admin">Admin Panel</a></nav></header>
<section class="container">
  <h2 class="section-title">Migration Tool</h2>
  <p class="section-sub">Upload Odoo export files, map data, and generate WooCommerce-ready import files.</p>
  <iframe id="legacyToolFrame" class="tool-frame" src="/migration-tool" title="Migration Tool" scrolling="no"></iframe>
</section>
<script>
(function () {
  var frame = document.getElementById("legacyToolFrame");
  if (!frame) {
    return;
  }

  function getFrameHeight() {
    try {
      var doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
      if (!doc) {
        return 0;
      }

      var body = doc.body;
      var html = doc.documentElement;
      return Math.max(
        body ? body.scrollHeight : 0,
        body ? body.offsetHeight : 0,
        html ? html.clientHeight : 0,
        html ? html.scrollHeight : 0,
        html ? html.offsetHeight : 0
      );
    } catch (error) {
      return 0;
    }
  }

  function syncFrameHeight() {
    var nextHeight = getFrameHeight();
    if (nextHeight > 0) {
      frame.style.height = nextHeight + "px";
    }
  }

  frame.addEventListener("load", function () {
    syncFrameHeight();

    try {
      var doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
      if (!doc) {
        return;
      }

      var target = doc.documentElement || doc.body;
      if (window.ResizeObserver && target) {
        var observer = new ResizeObserver(syncFrameHeight);
        observer.observe(target);
      }
    } catch (error) {
      window.setInterval(syncFrameHeight, 800);
      return;
    }

    window.setInterval(syncFrameHeight, 800);
  });
}());
</script>
</body>
</html>
